name: Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 ffmpeg

    - name: Install Sphinx and extensions
      run: |
        pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints

    - name: Regenerate proto files
      run: |
        pip install protobuf==3.20.3 grpcio-tools==1.48.0
        python -m grpc_tools.protoc \
          -I src/proto \
          --python_out=src/proto \
          --grpc_python_out=src/proto \
          src/proto/audio_processor.proto

    - name: Install project dependencies (lightweight)
      run: |
        grep -v -E "torch|PySide6" src/requirements.txt > requirements-light.txt || true
        pip install -r requirements-light.txt

    - name: Generate API documentation (no Submodules)
      run: |
        sphinx-apidoc \
          --force \
          --separate \
          --no-toc \
          --templatedir=docs/_templates \
          -o docs/source \
          src

    - name: Build documentation
      run: |
        cd docs
        sphinx-build -b html . _build/html

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4
      with:
        enablement: true

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/_build/html/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4